services:
  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: memgraph-mage
    pull_policy: always
    ports:
      - "7687:7687"
      - "7444:7444"
    command: ["--log-level=TRACE"]
    volumes:
      - memgraph_data:/var/lib/memgraph
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/7687"]
      interval: 5s
      timeout: 3s
      retries: 10

  memgraph-schema:
    build:
      context: ./schema
      dockerfile: Dockerfile
    depends_on:
      memgraph:
        condition: service_healthy
    restart: "no"
    environment:
      MG_HOST: memgraph
      MG_PORT: "7687"

  lab:
    image: memgraph/lab:latest
    container_name: memgraph-lab
    pull_policy: always
    ports:
      - "3001:3000"
    depends_on:
      memgraph:
        condition: service_healthy
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: "7687"

volumes:
  memgraph_data:
